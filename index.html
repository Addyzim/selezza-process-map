<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier ERP</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  :root{
    --bg:#faf8f4; --panel:#ffffff; --ink:#1d1a16; --muted:#6f6557;
    --gold:#b08d4f; --line:#e3dccf;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;line-height:1.5;}
  header{padding:24px 32px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#fff,#fbf9f5);position:relative;}
  header h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:26px;letter-spacing:.3px;}
  header .sub{color:var(--muted);margin-top:6px;font-size:14px;max-width:820px}
  .gold{color:var(--gold)}
  .langsw{position:absolute;top:22px;right:32px;display:flex;gap:6px}
  .langsw button{border:1px solid var(--line);background:#fff;border-radius:8px;
    padding:6px 12px;cursor:pointer;font-size:13px;color:var(--ink)}
  .langsw button.active{background:var(--gold);border-color:var(--gold);color:#fff}
  nav.tabs{display:flex;flex-wrap:wrap;gap:8px;padding:16px 32px;
    border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:5;}
  .tab{border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:9px 16px;border-radius:999px;cursor:pointer;font-size:14px;transition:.15s;}
  .tab:hover{border-color:var(--gold)}
  .tab.active{background:var(--gold);border-color:var(--gold);color:#fff}
  main{display:flex;gap:24px;padding:24px 32px;width:100%}
  .stage{flex:1;min-width:0}
  .stage h2{font-family:Georgia,serif;font-weight:600;font-size:20px;margin:0 0 4px;}
  .stage p.lead{color:var(--muted);margin:0 0 16px;max-width:760px}
  .diagram{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px;overflow:auto;box-shadow:0 1px 3px rgba(0,0,0,.03);}
  .mermaid{display:flex;justify-content:center;min-height:60px}
  aside.detail{width:320px;flex-shrink:0;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:18px;height:fit-content;position:sticky;top:92px;}
  aside.detail h3{margin:0 0 8px;font-size:15px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
  aside.detail .hint{font-size:12px;color:var(--muted);margin-bottom:12px}
  aside.detail .body{font-size:14px}
  .section{display:none}
  .section.active{display:block}
  .legend{margin-top:14px;font-size:12.5px;color:var(--muted)}
  footer{padding:18px 32px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--line)}
  @media(max-width:900px){main{flex-direction:column}aside.detail{width:auto;position:static}}
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;background:#faf8f4;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Georgia,serif">
  <div style="font-size:24px;letter-spacing:5px;margin-bottom:18px">SELEZZA&nbsp;LONDON</div>
  <input id="gatepw" type="password" placeholder="Passphrase" style="padding:11px 14px;border:1px solid #cdbb98;font-size:16px;outline:none"/>
  <button onclick="gateCheck()" style="margin-top:12px;padding:10px 22px;border:1px solid #1d1a16;background:#1d1a16;color:#fff;letter-spacing:2px;text-transform:uppercase;cursor:pointer">Enter</button>
  <div style="margin-top:16px;font-size:11px;color:#999">© 2026 Selezza London — Confidential</div>
</div>
<script>
function gateCheck(){var v=document.getElementById('gatepw').value;if(v==='selezza'){localStorage.setItem('slz_ok','1');document.getElementById('gate').style.display='none';}else{document.getElementById('gatepw').value='';document.getElementById('gatepw').placeholder='Wrong passphrase';}}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='gatepw')gateCheck();});
if(localStorage.getItem('slz_ok')==='1'){document.addEventListener('DOMContentLoaded',function(){var g=document.getElementById('gate');if(g)g.style.display='none';});}
</script>
<header>
  <div class="langsw" id="langsw">
    <button data-lang="tr">TR</button>
    <button data-lang="ru">RU</button>
    <button data-lang="en">EN</button>
  </div>
  <h1 id="h1"></h1>
  <div class="sub" id="sub"></div>
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-tab="overview"></button>
  <button class="tab" data-tab="intake"></button>
  <button class="tab" data-tab="board"></button>
  <button class="tab" data-tab="materials"></button>
  <button class="tab" data-tab="roles"></button>
  <button class="tab" data-tab="messages"></button>
</nav>

<main>
  <div class="stage">
    <section class="section active" id="overview">
      <h2></h2><p class="lead"></p>
      <div class="diagram"><pre class="mermaid"></pre></div>
      <div class="legend"></div>
    </section>
    <section class="section" id="intake">
      <h2></h2><p class="lead"></p>
      <div class="diagram"><pre class="mermaid"></pre></div>
      <div class="legend"></div>
    </section>
    <section class="section" id="board">
      <h2></h2><p class="lead"></p>
      <div class="diagram"><pre class="mermaid"></pre></div>
      <div class="legend"></div>
    </section>
    <section class="section" id="materials">
      <h2></h2><p class="lead"></p>
      <div class="diagram"><pre class="mermaid"></pre></div>
      <div class="legend"></div>
    </section>
    <section class="section" id="roles">
      <h2></h2><p class="lead"></p>
      <div class="diagram"><pre class="mermaid"></pre></div>
      <div class="legend"></div>
    </section>
    <section class="section" id="messages">
      <h2></h2><p class="lead"></p>
      <div class="diagram"><pre class="mermaid"></pre></div>
      <div class="legend"></div>
    </section>
  </div>

  <aside class="detail" id="detail">
    <h3 id="detailHead"></h3>
    <div class="hint" id="detailHint"></div>
    <div class="body" id="detailBody"></div>
  </aside>
</main>

<footer id="footer"></footer>

/* ============ ПОСТРОЕНИЕ ДИАГРАММ (один шаблон, метки подставляются) ============ */
function buildDiagrams(L){
  return {
    overview:
`flowchart TD
  A["${L.o_client}"] --> B["${L.o_intake}"]
  B --> C["${L.o_items}"]
  C --> D{"${L.o_distribute}"}
  D -->|"${L.e_addr}"| E["${L.o_assigned}"]
  D -->|"${L.e_pool}"| F["${L.o_free}"]
  E --> G["${L.o_work}"]
  F -->|"${L.e_take}"| G
  G --> H["${L.o_done}"]
  H --> I["${L.o_deliver}"]
  G -. "${L.e_return}" .-> F
  H --> J[("${L.o_analytics}")]
  click A nodeInfo
  click B nodeInfo
  click C nodeInfo
  click D nodeInfo
  click G nodeInfo
  click H nodeInfo
  click J nodeInfo
  classDef work fill:#fff6e6,stroke:#b08d4f,color:#1d1a16;
  classDef done fill:#eaf6ec,stroke:#4f9d69,color:#1d1a16;
  class G work; class H done;`,
    intake:
`flowchart TD
  A["${L.i_req}"] --> B["${L.i_open}"]
  B --> C{"${L.i_exists}"}
  C -->|"${L.e_yes}"| D["${L.i_pick}"]
  C -->|"${L.e_no}"| E["${L.i_create}"]
  D --> F["${L.i_add}"]
  E --> F
  F --> G["${L.i_each}"]
  G --> H{"${L.i_assignq}"}
  H -->|"${L.e_yes}"| I["${L.i_assign}"]
  H -->|"${L.e_no}"| J["${L.i_poolst}"]
  I --> K["${L.i_cards}"]
  J --> K`,
    board:
`stateDiagram-v2
  direction LR
  state "${L.b_queue}" as Queue
  state "${L.b_work}" as Work
  state "${L.b_done}" as Done
  [*] --> Queue
  Queue --> Work: ${L.b_t1}
  Work --> Done: ${L.b_t2}
  Work --> Queue: ${L.b_t3}
  Done --> [*]: ${L.b_t4}`,
    materials:
`flowchart TD
  P["${L.m_start}"] --> R["${L.m_norms}"]
  R --> Q{"${L.m_q}"}
  Q -->|"${L.e_yes}"| OK["${L.m_ok}"]
  Q -->|"${L.e_no}"| W["${L.m_warn}"]
  W --> OK
  OK -->|"${L.m_done}"| C["${L.m_consume}"]
  OK -->|"${L.m_ret}"| X["${L.m_release}"]
  C --> STK["${L.m_stk}"]
  STK --> AL{"${L.m_al}"}
  AL -->|"${L.e_yes}"| BUY["${L.m_buy}"]
  classDef warn fill:#fdeee0,stroke:#d08a3a,color:#1d1a16;
  class W warn;`,
    roles:
`flowchart TD
  subgraph MGMT["${L.r_mgmt}"]
    GD["${L.r_gd}"]
    OWN["${L.r_own}"]
    SL["${L.r_sl}"]
  end
  subgraph SHOP["${L.r_shop}"]
    SEW["${L.r_sew}"]
  end
  MGMT --> V1["${L.r_v1}"]
  SEW --> V2["${L.r_v2}"]
  SEW -. "${L.r_edge}" .-> MGMT
  classDef m fill:#eef3fb,stroke:#5b7aa8,color:#1d1a16;
  class GD,OWN,SL m;`,
    messages:
`flowchart LR
  S["${L.g_s}"] --> M[("${L.g_m}")]
  M --> IN["${L.g_in}"]
  IN --> RE["${L.g_re}"]
  RE --> S
  IN --> OK["${L.g_ok}"]`
  };
}

/* ============ РЕНДЕР И ПЕРЕКЛЮЧЕНИЕ ============ */
mermaid.initialize({ startOnLoad:false, securityLevel:'loose', theme:'base',
  themeVariables:{primaryColor:'#fffdf8',primaryBorderColor:'#cdbb98',primaryTextColor:'#1d1a16',
    lineColor:'#b08d4f',fontFamily:'Segoe UI, sans-serif',fontSize:'14px'}});

let lang = localStorage.getItem("atelier_lang") || "ru";
let activeTab = "overview";

window.nodeInfo = function(id){
  const d = UI[lang].info[id];
  if(d){
    document.getElementById('detailHint').textContent = '';
    document.getElementById('detailBody').innerHTML = '<b>'+d[0]+'</b><br/><br/>'+d[1];
  }
};

function setDiagramSources(){
  const D = buildDiagrams(LABELS[lang]);
  TABS.forEach(id => {
    const el = document.querySelector('#'+id+' .mermaid');
    el.removeAttribute('data-processed');
    el.innerHTML = D[id];
  });
}

function renderSection(id){
  const el = document.querySelector('#'+id+' .mermaid');
  if(el && !el.dataset.processed){ mermaid.run({ nodes:[el] }); }
}

function setPanelDefault(){
  document.getElementById('detailBody').textContent = UI[lang].defaults[activeTab];
  document.getElementById('detailHint').textContent =
    activeTab==='overview' ? UI[lang].hintOverview : '';
}

function applyLang(){
  const u = UI[lang];
  document.documentElement.lang = lang;
  document.getElementById('h1').innerHTML = 'Atelier ERP — <span class="gold">'+u.accent+'</span>';
  document.getElementById('sub').textContent = u.sub;
  document.getElementById('detailHead').textContent = u.detailHead;
  document.getElementById('footer').innerHTML = u.footer;
  document.querySelectorAll('.tab').forEach(t => t.textContent = u.tabs[t.dataset.tab]);
  TABS.forEach(id => {
    const s = u.sections[id];
    const sec = document.getElementById(id);
    sec.querySelector('h2').textContent = s.h2;
    sec.querySelector('.lead').textContent = s.lead;
    sec.querySelector('.legend').innerHTML = s.legend;
  });
  document.querySelectorAll('#langsw button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang===lang));
  setDiagramSources();
  renderSection(activeTab);
  setPanelDefault();
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  activeTab = t.dataset.tab;
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id===activeTab));
  renderSection(activeTab);
  setPanelDefault();
}));

document.querySelectorAll('#langsw button').forEach(b => b.addEventListener('click', () => {
  lang = b.dataset.lang;
  localStorage.setItem("atelier_lang", lang);
  applyLang();
}));

applyLang();
</script>
